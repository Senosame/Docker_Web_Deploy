version: '3.8'
 
services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: group17
      MYSQL_DATABASE: shop_db
    volumes:
      - ./app/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - shop-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pgroup17"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
 
  web:
    build: ./app
    container_name: flask_app
    restart: always
    ports:
      - "8080:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=group17
      - DB_NAME=shop_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shop-network
 
volumes:
  mysql_data:
 
networks:
  shop-network:
    driver: bridge